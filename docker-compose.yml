# Local-development infrastructure only. NOT FOR PRODUCTION.
# These passwords are intentionally weak dev-only defaults.
# Production uses docker-compose.prod.yml with secrets from .env.production.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev-root-password
      MYSQL_DATABASE: spw_v2_dev
      MYSQL_USER: spw_user
      MYSQL_PASSWORD: dev-password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - spw_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdev-root-password"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - spw_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  spw_mysql_data:
  spw_redis_data:
