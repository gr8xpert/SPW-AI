# Production docker-compose — `docker compose -f docker-compose.prod.yml up -d`.
#
# Required: a .env.production file at the repo root (copy from
# .env.production.example and fill in every value). compose will refuse
# to start if a required interpolation is missing.
#
# Notes on the topology:
#  - api binds only on the internal `spw_net` network. Expose it publicly
#    via a reverse proxy (nginx/Caddy/Traefik) terminating TLS.
#  - dashboard is exposed on port 3000 for convenience; in a multi-host
#    deploy front it with the same reverse proxy.
#  - widget-static serves the built widget bundle on port 8080 so the WP
#    plugin (or tenant sites) can include it without a separate CDN.
#  - mysql + redis bind only on the internal network — they're not
#    reachable from the host unless you add a `ports:` mapping.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: spw/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BIND_HOST: 0.0.0.0
      # Application
      API_URL: ${API_URL:?API_URL is required}
      DASHBOARD_URL: ${DASHBOARD_URL:?DASHBOARD_URL is required}
      # Database
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      DATABASE_USER: ${MYSQL_USER:?MYSQL_USER is required}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DATABASE_LOGGING: "false"
      DATABASE_SYNCHRONIZE: "false"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD-}
      # Secrets — compose refuses to start if any are missing.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required (>=32 chars)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (32 chars)}
      # System SMTP
      SMTP_HOST: ${SMTP_HOST-}
      SMTP_PORT: ${SMTP_PORT-587}
      SMTP_USER: ${SMTP_USER-}
      SMTP_PASSWORD: ${SMTP_PASSWORD-}
      SMTP_SECURE: ${SMTP_SECURE-false}
      SMTP_FROM: ${SMTP_FROM-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME-}
      # Operator DKIM (6B). Optional — leave empty for unsigned system
      # mail. Boot-audit rejects a partial/placeholder key in prod.
      MAIL_DKIM_DOMAIN: ${MAIL_DKIM_DOMAIN-}
      MAIL_DKIM_SELECTOR: ${MAIL_DKIM_SELECTOR-}
      MAIL_DKIM_PRIVATE_KEY: ${MAIL_DKIM_PRIVATE_KEY-}
      # Paddle inbound webhook (6A). Optional — empty disables. Boot-audit
      # rejects a placeholder secret in prod.
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET-}
      PADDLE_GRACE_DAYS: ${PADDLE_GRACE_DAYS-7}
      # Paddle outbound checkout (6E). Optional — empty disables the
      # /api/billing/checkout endpoint with a 503. Boot-audit rejects
      # placeholder values in prod, and warns if the inbound secret is
      # set but the API key is missing (half-configured).
      PADDLE_API_KEY: ${PADDLE_API_KEY-}
      PADDLE_API_URL: ${PADDLE_API_URL-https://api.paddle.com}
      # Seed (used by `node dist/database/seed.js` — optional).
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL-}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD-}
      # Webhook guards — NEVER set this to true in prod.
      WEBHOOK_ALLOW_LOOPBACK: "false"
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "${API_BIND:-127.0.0.1:3001}:3001"
    volumes:
      - spw_uploads:/app/uploads
    networks:
      - spw_net

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required (baked into client bundle)}
    image: spw/dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXTAUTH_URL: ${DASHBOARD_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      API_URL: http://api:3001
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1:3000}:3000"
    networks:
      - spw_net

  widget-static:
    build:
      context: .
      dockerfile: apps/widget/Dockerfile
    image: spw/widget:${IMAGE_TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    ports:
      - "${WIDGET_BIND:-127.0.0.1:8080}:80"
    networks:
      - spw_net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
      # Smaller memory footprint on a single-tenant deploy. Tune up on
      # dedicated DB hosts.
      - --innodb-buffer-pool-size=256M
    volumes:
      - spw_mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--socket=/var/run/mysqld/mysqld.sock"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spw_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD-}
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - spw_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spw_net

networks:
  spw_net:
    driver: bridge

volumes:
  spw_mysql_data:
  spw_redis_data:
  spw_uploads:
