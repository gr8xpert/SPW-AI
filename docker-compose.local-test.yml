# Local full-stack test overlay for docker-compose.prod.yml.
#
# Exposes the API port directly (no reverse proxy needed) and runs
# migrations + seed automatically after boot.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.local-test.yml \
#     --env-file .env.docker-local up -d --build
#
# Then:
#   - Dashboard: http://localhost:3000
#   - API:       http://localhost:3001/api/health/ready
#   - Widget:    http://localhost:8080
#
# Run migrations after the API starts:
#   docker compose -f docker-compose.prod.yml -f docker-compose.local-test.yml \
#     --env-file .env.docker-local exec api node dist/database/run-migrations.js
#
# Seed default data (plans, super-admin):
#   docker compose -f docker-compose.prod.yml -f docker-compose.local-test.yml \
#     --env-file .env.docker-local exec api node dist/database/seed.js
#
# Tear down (destroys data):
#   docker compose -f docker-compose.prod.yml -f docker-compose.local-test.yml \
#     --env-file .env.docker-local down -v

services:
  api:
    ports:
      - "0.0.0.0:3001:3001"
    environment:
      # Keep WEBHOOK_ALLOW_LOOPBACK=false (production-safe). The only
      # difference from real prod is that we expose port 3001 directly
      # instead of going through a reverse proxy.

  redis:
    # Override the prod command: when REDIS_PASSWORD is empty the shell
    # expansion in the prod file produces empty-string args that crash
    # Redis 7.4. Use a clean command without password auth for local.
    command: ["redis-server", "--appendonly", "yes"]
