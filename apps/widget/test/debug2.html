<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPW Debug 2 — Direct Import Test</title>
</head>
<body>
  <h2>SPW Debug 2 — Direct Import Test</h2>
  <pre id="log" style="background:#111;color:#0f0;padding:1rem;font-size:13px;max-height:400px;overflow:auto;"></pre>

  <div id="test-target" style="border:2px solid red; padding:1rem; margin:1rem 0;">
    Target div — component should render here
  </div>

  <script>
    var logEl = document.getElementById('log');
    window._log = function(msg) { logEl.textContent += msg + '\n'; console.log(msg); };
    window.addEventListener('error', function(e) { window._log('[ERROR] ' + e.message + ' @ ' + e.filename + ':' + e.lineno); });
    window.addEventListener('unhandledrejection', function(e) { window._log('[UNHANDLED] ' + (e.reason && (e.reason.stack || e.reason.message) || e.reason)); });
  </script>

  <!-- Use a separate module file that Vite can transform with proper alias resolution -->
  <script type="module" src="/test/debug2-runner.ts"></script>
</body>
</html>
