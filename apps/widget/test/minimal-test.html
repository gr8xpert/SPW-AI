<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPW Minimal Import Test</title>
</head>
<body>
  <h2>Minimal Dynamic Import Test</h2>
  <pre id="log" style="background:#111;color:#0f0;padding:1rem;font-size:13px;max-height:600px;overflow:auto;white-space:pre-wrap;"></pre>
  <hr>
  <h3>Mount Target (should show a location dropdown)</h3>
  <div id="mount-target" style="padding:1rem;border:2px dashed blue;min-height:50px;"></div>

  <script>
    var logEl = document.getElementById('log');
    var origLog = console.log;
    var origError = console.error;
    function log(msg) {
      var ts = new Date().toISOString().substr(11, 12);
      logEl.textContent += '[' + ts + '] ' + msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      origLog.call(console, msg);
    }
    window.onerror = function(msg, src, line) { log('UNCAUGHT: ' + msg + ' at ' + src + ':' + line); };
    window.addEventListener('unhandledrejection', function(e) {
      log('UNHANDLED REJECTION: ' + (e.reason && (e.reason.stack || e.reason.message) || e.reason));
    });
  </script>

  <script>
    window.RealtySoftConfig = {
      apiUrl: 'http://127.0.0.1:3001',
      apiKey: 'test-key-12345',
      language: 'en',
      currency: 'EUR',
    };
  </script>
  <script src="mock-data.js"></script>

  <script type="module">
    var logEl = document.getElementById('log');
    function log(msg) {
      var ts = new Date().toISOString().substr(11, 12);
      logEl.textContent += '[' + ts + '] ' + msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    log('=== TEST 1: Import store (no JSX) ===');
    try {
      const { store } = await import('/src/core/store.ts');
      log('OK: store type = ' + typeof store + ', state keys = ' + Object.keys(store.getState()).join(', '));
    } catch (err) {
      log('FAIL: ' + err.message);
    }

    log('=== TEST 2: Import RsLocation component ===');
    try {
      const t0 = performance.now();
      const mod = await import('/src/components/search/RsLocation.tsx');
      const t1 = performance.now();
      log('OK: default = ' + typeof mod.default + ', took ' + Math.round(t1 - t0) + 'ms');
    } catch (err) {
      log('FAIL: ' + err.message + '\n' + err.stack);
    }

    log('=== TEST 3: Hydrate store with mock data and render ===');
    try {
      const { store } = await import('/src/core/store.ts');
      const { actions } = await import('/src/core/actions.ts');

      // Hydrate with mock data
      const spwData = window.__SPW_DATA__;
      if (spwData) {
        actions.setLocations(spwData.locations);
        actions.setPropertyTypes(spwData.types);
        actions.setFeatures(spwData.features);
        actions.setLabels(spwData.labels);
        if (spwData.defaultResults) actions.setResults(spwData.defaultResults);
        log('Store hydrated: locations=' + store.getState().locations.length + ', results=' + !!store.getState().results);
      } else {
        log('WARNING: window.__SPW_DATA__ not set!');
      }

      const { render } = await import('preact');
      const { h } = await import('preact');
      const { default: RsLocation } = await import('/src/components/search/RsLocation.tsx');

      log('Rendering RsLocation...');
      const target = document.getElementById('mount-target');
      render(h(RsLocation, { variation: 1 }), target);
      log('Render call returned OK');
    } catch (err) {
      log('FAIL: ' + err.message + '\n' + err.stack);
    }

    log('=== TEST 4: Full widget init ===');
    try {
      const t0 = performance.now();
      const widget = await import('/src/index.ts');
      const t1 = performance.now();
      log('OK: took ' + Math.round(t1 - t0) + 'ms, exports = ' + Object.keys(widget).join(', '));
    } catch (err) {
      log('FAIL: ' + err.message + '\n' + err.stack);
    }

    log('=== ALL TESTS DONE ===');
  </script>
</body>
</html>
