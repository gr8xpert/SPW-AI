<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 1 — Single Location Dropdown</title>
</head>
<body>
  <h2>Test 1: Location Dropdown Only</h2>
  <pre id="log" style="background:#111;color:#0f0;padding:1rem;font-size:13px;max-height:400px;overflow:auto;white-space:pre-wrap;"></pre>

  <div id="mount" style="border:2px dashed blue;padding:1rem;margin:1rem 0;min-height:60px;"></div>

  <script>
    window.onerror = function(m,s,l){ document.getElementById('log').textContent += 'UNCAUGHT: '+m+'\n'; };
    window.addEventListener('unhandledrejection', function(e){
      document.getElementById('log').textContent += 'REJECTION: '+(e.reason&&(e.reason.stack||e.reason.message)||e.reason)+'\n';
    });
  </script>

  <script type="module" src="/test/test1-runner.ts"></script>
</body>
</html>
